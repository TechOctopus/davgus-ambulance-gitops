apiVersion: apps/v1
kind: Deployment
metadata:
  name: davgus-ambulance-ufe-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      pod: davgus-ambulance-ufe-label
  template:
    metadata:
      labels:
        pod: davgus-ambulance-ufe-label
    spec:
      containers:
        - name: davgus-ambulance-ufe-container
          image: fiitkar/davgus-ambulance-ufe
          imagePullPolicy: Always

          ports:
            - name: http
              containerPort: 8080

          resources:
            requests:
              memory: "32M"
              cpu: "0.1"
            limits:
              memory: "320M"
              cpu: "0.3"
